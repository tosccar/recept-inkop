{% extends "base.html" %}
{% block title %}Alla recept – Recept & Inköp{% endblock %}
{% block content %}
<h1>Recept</h1>

<div class="filter-panel">
    <input type="text" name="search" placeholder="Sök recept, ingrediens..."
           value="{{ search }}"
           hx-get="/htmx/recipes"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#recipe-list"
           hx-include=".filter-control"
           class="search-input">
    <input type="hidden" name="category" id="category-filter" class="filter-control" value="{{ selected_category }}">
    <input type="hidden" name="tag" id="tag-filter" class="filter-control" value="{{ selected_tag }}">
    <!-- category och tag kan vara kommaseparerade för flerval -->
    <input type="hidden" name="sort" id="sort-filter" class="filter-control" value="{{ selected_sort }}">
    <div class="quick-filters">
        <button type="button" class="qf-btn qf-cat-alla {% if not selected_category %}active{% endif %}"
                onclick="filterCategory('')">Alla</button>
        {% for cat in categories %}
        <button type="button" class="qf-btn qf-cat {% if cat in (selected_category or '').split(',') %}active{% endif %}"
                onclick="filterCategory('{{ cat }}')">{{ cat|capitalize }}</button>
        {% endfor %}
    </div>
    <div class="quick-filters tag-filters">
        {% for t in predefined_tags %}
        <button type="button" class="qf-btn qf-tag {% if selected_tag == t.id %}active{% endif %}"
                onclick="filterTag('{{ t.id }}')">{{ t.label }}</button>
        {% endfor %}
    </div>
</div>

<div id="recipe-list">
    {% include "_recipe_list.html" %}
</div>

<script>
function doSearch() {
    const search = document.querySelector('[name="search"]').value;
    const category = document.getElementById('category-filter').value;
    const tag = document.getElementById('tag-filter').value;
    const sort = document.getElementById('sort-filter').value;
    const url = `/htmx/recipes?search=${encodeURIComponent(search)}&category=${encodeURIComponent(category)}&tag=${encodeURIComponent(tag)}&sort=${encodeURIComponent(sort)}`;
    htmx.ajax('GET', url, '#recipe-list');
}

function sortBy(column) {
    const sortInput = document.getElementById('sort-filter');
    const current = sortInput.value;

    const sortMap = {
        'name': ['name_asc', 'name_desc'],
        'category': ['category_asc', 'category_desc'],
        'rating': ['rating_desc', 'rating_asc'],
        'servings': ['servings_asc', 'servings_desc'],
        'newest': ['newest', 'oldest'],
    };

    const options = sortMap[column];
    if (!options) return;
    sortInput.value = (current === options[0]) ? options[1] : options[0];
    doSearch();
}

function toggleFilter(inputId, value, btnClass) {
    const input = document.getElementById(inputId);
    let values = input.value ? input.value.split(',') : [];
    const idx = values.indexOf(value);
    if (idx >= 0) {
        values.splice(idx, 1);
    } else {
        values.push(value);
    }
    input.value = values.join(',');

    // Uppdatera knapp-states
    const btn = event?.target?.closest?.('.' + btnClass);
    if (btn) btn.classList.toggle('active');

    // Hantera "Alla"-knappen för kategorier
    if (inputId === 'category-filter') {
        const allaBtn = document.querySelector('.qf-cat-alla');
        if (values.length === 0) {
            allaBtn?.classList.add('active');
        } else {
            allaBtn?.classList.remove('active');
        }
    }
    doSearch();
}

function filterTag(tag) {
    toggleFilter('tag-filter', tag, 'qf-tag');
}

function filterCategory(cat) {
    if (cat === '') {
        // "Alla" klickad — rensa alla kategorier
        document.getElementById('category-filter').value = '';
        document.querySelectorAll('.qf-cat').forEach(b => b.classList.remove('active'));
        document.querySelector('.qf-cat-alla')?.classList.add('active');
        doSearch();
        return;
    }
    toggleFilter('category-filter', cat, 'qf-cat');
}
</script>
{% endblock %}
